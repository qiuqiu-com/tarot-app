  <!-- 装饰角 -->
  <path d="M10 10 L30 10 L30 12 L12 12 L12 30 L10 30 Z" fill="url(#gold)" opacity="0.6"/>
  <path d="M190 10 L170 10 L170 12 L188 12 L188 30 L190 30 Z" fill="url(#gold)" opacity="0.6"/>
  <path d="M10 190 L30 190 L30 188 L12 188 L12 170 L10 170 Z" fill="url(#gold)" opacity="0.6"/>
  <path d="M190 190 L170 190 L170 188 L188 188 L188 170 L190 170 Z" fill="url(#gold)" opacity="0.6"/>
  <!-- 额头上方千年眼符号 -->
  <circle cx="100" cy="48" r="6" stroke="url(#gold)" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="48" r="2.5" fill="url(#gold)"/>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
