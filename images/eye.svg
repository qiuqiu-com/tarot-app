  <path d="M55 85 Q70 65 100 68 Q130 65 145 85" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
  <!-- 下眼睫毛 -->
  <path d="M55 105 Q70 120 100 118 Q130 120 145 105" stroke="url(#gold)" stroke-width="2" fill="none"/>
