  <line x1="100" y1="79" x2="100" y2="73" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="111" x2="100" y2="117" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="84" y1="95" x2="78" y2="95" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="116" y1="95" x2="122" y2="95" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="89" y1="84" x2="84" y2="79" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="111" y1="84" x2="116" y2="79" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="89" y1="106" x2="84" y2="111" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="111" y1="106" x2="116" y2="111" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
