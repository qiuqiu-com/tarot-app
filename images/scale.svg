<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 外圈 -->
  <circle cx="100" cy="100" r="90" stroke="url(#gold)" stroke-width="4" fill="none"/>
  <circle cx="100" cy="100" r="82" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- 天平横梁 -->
  <path d="M30 60 L170 60" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <!-- 中柱 -->
  <path d="M100 60 L100 130" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <!-- 底座 -->
  <path d="M70 130 L130 130" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M85 130 L85 150 L115 150 L115 130" stroke="url(#gold)" stroke-width="3" fill="none"/>
  <!-- 左盘 -->
  <path d="M30 60 Q20 95 30 105 Q40 115 30 120" stroke="url(#gold)" stroke-width="3" fill="none"/>
  <ellipse cx="30" cy="120" rx="22" ry="8" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
  <!-- 右盘 -->
  <path d="M170 60 Q180 95 170 105 Q160 115 170 120" stroke="url(#gold)" stroke-width="3" fill="none"/>
  <ellipse cx="170" cy="120" rx="22" ry="8" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
  <!-- 左盘装饰 -->
  <line x1="20" y1="118" x2="40" y2="118" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="122" x2="38" y2="122" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- 右盘装饰 -->
  <line x1="160" y1="118" x2="180" y2="118" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="162" y1="122" x2="178" y2="122" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- 千年眼符号（中心） -->
  <circle cx="100" cy="42" r="8" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <circle cx="100" cy="42" r="3" fill="url(#gold)"/>
  <!-- 装饰角 -->
  <path d="M10 10 L30 10 L30 12 L12 12 L12 30 L10 30 Z" fill="url(#gold)" opacity="0.6"/>
  <path d="M190 10 L170 10 L170 12 L188 12 L188 30 L190 30 Z" fill="url(#gold)" opacity="0.6"/>
  <path d="M10 190 L30 190 L30 188 L12 188 L12 170 L10 170 Z" fill="url(#gold)" opacity="0.6"/>
  <path d="M190 190 L170 190 L170 188 L188 188 L188 170 L190 170 Z" fill="url(#gold)" opacity="0.6"/>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e8d48b"/>
      <stop offset="100%" stop-color="#a8872e"/>
    </linearGradient>
  </defs>
</svg>
