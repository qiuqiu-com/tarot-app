<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title data-i18n="title">神秘塔罗 · 专业占卜</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="stars"></div>

<div id="app">

    <!-- ==================== 语言切换 ==================== -->
    <div id="lang-switcher">
        <button data-lang="zh" class="active">中</button>
        <button data-lang="en">EN</button>
        <button data-lang="ru">RU</button>
    </div>

    <!-- ==================== 欢迎页 ==================== -->
    <section id="page-welcome" class="page page-welcome active">
        <div class="logo-container">
            <div class="logo-scale-wrap">
                <img src="images/scale.png" class="logo-scale" alt=""/>
                <img src="images/eye.png" class="logo-eye" alt=""/>
            </div>
            <div class="logo-title" data-i18n="title"></div>
            <div class="logo-tagline" data-i18n="tagline"></div>
        </div>

        <div class="question-area">
            <label data-i18n="q-label"></label>
            <input type="text" id="question-input" data-i18n-placeholder="q-placeholder" maxlength="100">
        </div>

        <div class="welcome-actions">
            <button id="btn-start" class="btn-gold" data-i18n="btn-start"></button>
            <button id="btn-daily" class="btn-ghost" data-i18n="btn-daily"></button>
            <button id="btn-index" class="btn-ghost" data-i18n="btn-index"></button>
            <button id="btn-history" class="btn-ghost" data-i18n="btn-history"></button>
        </div>
    </section>

    <!-- ==================== 选择牌阵 ==================== -->
    <section id="page-spread" class="page">
        <div class="page-header">
            <button class="btn-back" data-target="page-welcome">←</button>
            <h2 data-i18n="page-spread"></h2>
            <p data-i18n="spread-desc"></p>
        </div>
        <div class="spread-grid" id="spread-grid">
            <!-- JS 动态渲染 -->
        </div>
    </section>

    <!-- ==================== 洗牌 ==================== -->
    <section id="page-shuffle" class="page">
        <div class="page-header">
            <h2 data-i18n="page-shuffle"></h2>
        </div>
        <div class="shuffle-area">
            <div class="shuffle-question" id="shuffle-question"></div>
            <div class="shuffle-table" id="shuffle-table"></div>
            <p class="shuffle-hint" data-i18n="shuffle-hint"></p>
            <div class="shuffle-progress">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </section>

    <!-- ==================== 翻牌 ==================== -->
    <section id="page-draw" class="page">
        <div class="page-header">
            <h2 data-i18n="page-draw"></h2>
            <p id="draw-hint" data-i18n="draw-hint"></p>
        </div>
        <div class="draw-area" id="draw-area"></div>
    </section>

    <!-- ==================== 解读结果 ==================== -->
    <section id="page-reading" class="page">
        <div class="page-header">
            <button class="btn-back" data-target="page-welcome">←</button>
            <h2 data-i18n="page-reading"></h2>
        </div>
        <div class="reading-area" id="reading-area"></div>
        <div class="reading-actions">
            <button id="btn-save" class="btn-gold small" data-i18n="btn-save"></button>
            <button id="btn-share-toggle" class="btn-ghost" data-i18n="btn-share"></button>
            <button id="btn-redo" class="btn-ghost" data-i18n="btn-redo"></button>
            <div class="share-text" id="share-text-box">
                <textarea id="share-textarea" readonly></textarea>
                <button class="btn-gold small" id="btn-copy-share" style="margin-top:8px;" data-i18n="btn-copy"></button>
            </div>
        </div>
    </section>

    <!-- ==================== 卡牌百科 ==================== -->
    <section id="page-index" class="page">
        <div class="page-header">
            <button class="btn-back" data-target="page-welcome">←</button>
            <h2 data-i18n="page-index"></h2>
            <p data-i18n="index-desc"></p>
        </div>
        <div class="index-controls">
            <input type="text" id="index-search" placeholder="🔍 搜索牌名……">
            <div class="index-filters" id="index-filters">
                <button data-filter="all" class="active" data-i18n="filter-all"></button>
                <button data-filter="major" data-i18n="filter-major"></button>
                <button data-filter="wands" data-i18n="filter-wands"></button>
                <button data-filter="cups" data-i18n="filter-cups"></button>
                <button data-filter="swords" data-i18n="filter-swords"></button>
                <button data-filter="pentacles" data-i18n="filter-pentacles"></button>
            </div>
        </div>
        <div class="index-grid" id="index-grid"></div>
    </section>

    <!-- ==================== 每日塔罗 ==================== -->
    <section id="page-daily" class="page">
        <div class="page-header">
            <button class="btn-back" data-target="page-welcome">←</button>
            <h2 data-i18n="page-daily"></h2>
            <p data-i18n="daily-desc"></p>
        </div>
        <div class="daily-card-area" id="daily-card-area"></div>
    </section>

    <!-- ==================== 历史记录 ==================== -->
    <section id="page-history" class="page">
        <div class="page-header">
            <button class="btn-back" data-target="page-welcome">←</button>
            <h2 data-i18n="page-history"></h2>
            <p data-i18n="history-desc"></p>
        </div>
        <div class="history-list" id="history-list"></div>
        <div class="history-empty" id="history-empty">
            <p data-i18n="history-empty"></p>
            <button class="btn-gold small" onclick="showPage('page-welcome')" data-i18n="history-empty-btn"></button>
        </div>
    </section>

</div>

<!-- ==================== 卡牌详情弹窗 ==================== -->
<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-dialog" id="modal-dialog"></div>
</div>

<!-- ==================== 脚本 ==================== -->
<script src="js/cards.js"></script>
<script src="js/lang.js"></script>
<script src="js/spreads.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
</body>
</html>
